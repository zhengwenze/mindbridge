name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: mock
      DOCKER_OLLAMA_BASE_URL: ""
      KNOWLEDGE_VECTOR_ENABLED: "true"
      KNOWLEDGE_VECTOR_REQUIRED: "true"
      TOOL_QUEUE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5
      - name: Start Docker test stack
        run: docker compose up -d --build
      - name: Wait for application health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/actuator/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs app
          exit 1
      - name: Compile app
        run: docker compose exec -T app python -m compileall app tests
      - name: Run tests
        run: |
          docker compose exec -T app env \
            MINDBRIDGE_BASE_URL=http://127.0.0.1:8000 \
            python -m unittest discover -s tests
      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop Docker test stack
        if: always()
        run: docker compose down -v
